name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build (linux/amd64)
        run: |
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/sxsc_linux_amd64 ./cmd/sxsc

      - name: Build (linux/arm64)
        run: |
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/sxsc_linux_arm64 ./cmd/sxsc

      - name: Build (macos/amd64)
        run: |
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/sxsc_darwin_amd64 ./cmd/sxsc

      - name: Build (macos/arm64)
        run: |
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/sxsc_darwin_arm64 ./cmd/sxsc

      - name: Build (windows/amd64)
        run: |
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/sxsc_windows_amd64.exe ./cmd/sxsc

      - name: Checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: sxsc ${{ github.ref_name }}
          body: |
            sxsc ${{ github.ref_name }} — SentinelX Web Vulnerability Scanner

            ### Install
            ```bash
            go install github.com/SentinelXofficial/sxsc/cmd/sxsc@${{ github.ref_name }}
            ```

            ### Download
            | Platform | File |
            |----------|------|
            | Linux x86_64 | `sxsc_linux_amd64` |
            | Linux ARM64 | `sxsc_linux_arm64` |
            | macOS Intel | `sxsc_darwin_amd64` |
            | macOS Apple Silicon | `sxsc_darwin_arm64` |
            | Windows x86_64 | `sxsc_windows_amd64.exe` |

            See [CHANGELOG.md](https://github.com/SentinelXofficial/sxsc/blob/main/CHANGELOG.md) for details.
          files: |
            dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
